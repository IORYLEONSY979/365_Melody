<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Melody ❤️</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            transition: background 1.5s ease-in-out;
            overflow: hidden;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .cursive-font { font-family: 'Dancing Script', cursive; }
        .title-font { font-family: 'Pacifico', cursive; }

        /* Mensaje Superior */
        .top-message {
            position: absolute;
            top: 5vh;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 20;
            width: 100%;
            padding: 0 20px;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            position: relative;
            margin-top: 40px; 
        }

        /* Corazones Flotantes */
        .heart-bg {
            position: absolute;
            animation: floatUp linear infinite;
            z-index: 1;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        /* Animaciones de Texto */
        .anim-fade-up { animation: fadeUp 1.2s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anim-zoom-in { animation: zoomIn 1.2s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .anim-glow { animation: glowAnim 2s ease-in-out forwards; }
        @keyframes glowAnim {
            0% { opacity: 0; text-shadow: 0 0 0px rgba(255,255,255,0); }
            50% { text-shadow: 0 0 20px rgba(255,255,255,0.8); }
            100% { opacity: 1; text-shadow: 0 0 5px rgba(255,255,255,0.3); }
        }

        /* Botón Siguiente */
        .btn-love { transition: all 0.3s ease; }
        .btn-love:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-love:active { transform: scale(0.95); }

        #phrase-container {
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Reproductor de Audio Local */
        #local-audio-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 50;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .audio-controls-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 8px;
        }

        .audio-btn {
            cursor: pointer;
            font-size: 1.5rem;
            transition: transform 0.2s, color 0.2s;
        }
        .audio-btn:hover { 
            transform: scale(1.1);
            color: #ff7eb3;
        }

        .song-name {
            font-size: 0.85rem;
            font-weight: 600;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.8rem;
        }

        input[type=range] {
            width: 80px;
            cursor: pointer;
        }

        /* Botón Reiniciar */
        #reset-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: background 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #reset-btn:hover { background: rgba(255,255,255,0.3); }

    </style>
</head>
<body id="main-body" class="bg-gradient-to-br from-gray-900 via-purple-900 to-black">

    <!-- Mensaje Especial Superior -->
    <div class="top-message">
        <h1 class="title-font text-3xl md:text-5xl text-pink-200">Mi Melody hermosa</h1>
        <p class="cursive-font text-xl md:text-2xl mt-1 text-white opacity-90">Esto es para ti...</p>
    </div>

    <!-- Botón Reset -->
    <button id="reset-btn" onclick="resetProgress()" title="Reiniciar desde el Día 1">
        <i class="fa-solid fa-rotate-left"></i> Reiniciar
    </button>

    <!-- Corazones -->
    <div id="hearts-container" class="absolute inset-0 overflow-hidden pointer-events-none"></div>

    <!-- Tarjeta Principal -->
    <div class="glass-card w-11/12 max-w-lg mx-auto p-8 text-center text-white">
        
        <div class="mb-4">
            <span id="day-counter" class="bg-white/20 px-5 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase shadow-sm">
                Día 1 / 365
            </span>
        </div>

        <div class="text-4xl text-red-500 mb-2 drop-shadow-md">
            <i class="fa-solid fa-heart fa-beat" style="--fa-animation-duration: 2s;"></i>
        </div>

        <div id="phrase-container" class="my-6">
            <p id="love-phrase" class="cursive-font text-3xl md:text-4xl leading-relaxed drop-shadow-lg anim-fade-up">
                Cargando mi amor por ti...
            </p>
        </div>

        <button onclick="nextDay()" class="btn-love mt-4 bg-white/90 text-gray-900 font-bold py-3 px-8 rounded-full shadow-lg flex items-center justify-center mx-auto gap-2 text-lg">
            Siguiente Día <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <!-- Controles de Audio Locales -->
    <div id="local-audio-player">
        <div class="song-name" id="current-song-name">Cargando playlist...</div>
        
        <div class="audio-controls-row">
            <i class="fa-solid fa-backward-step audio-btn" onclick="prevSong()" title="Anterior"></i>
            <i id="play-btn" class="fa-solid fa-circle-play audio-btn text-4xl" onclick="togglePlay()" title="Reproducir/Pausar"></i>
            <i class="fa-solid fa-forward-step audio-btn" onclick="nextSong()" title="Siguiente"></i>
        </div>

        <div class="volume-control">
            <i class="fa-solid fa-volume-low"></i>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" onchange="changeVolume()">
            <i class="fa-solid fa-volume-high"></i>
        </div>
    </div>

    <!-- Elemento Audio Nativo Oculto -->
    <audio id="audio-element" onended="nextSong()"></audio>

    <script>
        // ==========================================
        // 1. PLAYLIST LOCAL (20 CANCIONES)
        // ==========================================
        // IMPORTANTE: Asegúrate de tener una carpeta llamada "musica" al lado de este archivo HTML.
        // Los nombres de los archivos mp3 deben ser EXACTAMENTE estos:
        
        const localPlaylist = [
            { name: "The Cure - Lovesong", file: "01_lovesong.mp3" },
            { name: "Bon Jovi - Always", file: "02_always.mp3" },
            { name: "Metallica - Nothing Else Matters", file: "03_nothing_else_matters.mp3" },
            { name: "Bon Jovi - Bed Of Roses", file: "04_bed_of_roses.mp3" },
            { name: "The Cure - Pictures Of You", file: "05_pictures_of_you.mp3" },
            { name: "Aerosmith - I Don't Want To Miss A Thing", file: "06_miss_a_thing.mp3" },
            { name: "Guns N' Roses - November Rain", file: "07_november_rain.mp3" },
            { name: "Scorpions - Still Loving You", file: "08_still_loving_you.mp3" },
            { name: "The Cure - Just Like Heaven", file: "09_just_like_heaven.mp3" },
            { name: "Bon Jovi - I'll Be There For You", file: "10_there_for_you.mp3" },
            { name: "Queen - Love Of My Life", file: "11_love_of_my_life.mp3" },
            { name: "Bryan Adams - (Everything I Do) I Do It For You", file: "12_everything_i_do.mp3" },
            { name: "Oasis - Wonderwall", file: "13_wonderwall.mp3" },
            { name: "Coldplay - Yellow", file: "14_yellow.mp3" },
            { name: "Goo Goo Dolls - Iris", file: "15_iris.mp3" },
            { name: "Def Leppard - Love Bites", file: "16_love_bites.mp3" },
            { name: "Whitesnake - Is This Love", file: "17_is_this_love.mp3" },
            { name: "Foreigner - I Want To Know What Love Is", file: "18_know_what_love_is.mp3" },
            { name: "U2 - With Or Without You", file: "19_with_or_without_you.mp3" },
            { name: "The Police - Every Breath You Take", file: "20_every_breath.mp3" }
        ];

        const audioPlayer = document.getElementById('audio-element');
        const playBtn = document.getElementById('play-btn');
        const songNameEl = document.getElementById('current-song-name');
        const volumeSlider = document.getElementById('volume-slider');
        
        let currentSongIndex = 0;
        let isPlaying = false;

        // Inicializar reproductor
        function initPlayer() {
            audioPlayer.volume = volumeSlider.value;
            loadSong(currentSongIndex);
        }

        function loadSong(index) {
            audioPlayer.src = localPlaylist[index].file;
            songNameEl.innerText = localPlaylist[index].name;
        }

        function togglePlay() {
            if (isPlaying) {
                audioPlayer.pause();
                playBtn.classList.remove('fa-circle-pause');
                playBtn.classList.add('fa-circle-play');
                isPlaying = false;
            } else {
                // Capturar error si el archivo no existe en la carpeta local
                const playPromise = audioPlayer.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        // Reproducción exitosa
                        playBtn.classList.remove('fa-circle-play');
                        playBtn.classList.add('fa-circle-pause');
                        isPlaying = true;
                    })
                    .catch(error => {
                        console.error("Error reproduciendo audio:", error);
                        songNameEl.innerText = "Error: Archivo no encontrado";
                        // Auto-saltar a la siguiente si falla
                        setTimeout(nextSong, 2000); 
                    });
                }
            }
        }

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % localPlaylist.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                const playPromise = audioPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        songNameEl.innerText = "Error: Archivo no encontrado";
                        setTimeout(nextSong, 2000);
                    });
                }
            }
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + localPlaylist.length) % localPlaylist.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                const playPromise = audioPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        songNameEl.innerText = "Error: Archivo no encontrado";
                        setTimeout(nextSong, 2000);
                    });
                }
            }
        }

        function changeVolume() {
            audioPlayer.volume = volumeSlider.value;
        }

        // Cargar primera canción al inicio
        initPlayer();


        // ==========================================
        // 2. LÓGICA DE DÍAS, FRASES Y FONDOS
        // ==========================================
        const frasesDeAmor = [
            "Eres mi primer pensamiento al despertar y el último antes de dormir.",
            "Me enamoré de tu forma de ser, de tus ojos y de tu sonrisa, Melody.",
            "Si tuviera que elegir otra vez, te elegiría a ti sin dudarlo ni un segundo.",
            "Me haces más feliz de lo que jamás imaginé que podría llegar a ser.",
            "Te quiero no solo por cómo eres, sino por cómo soy cuando estoy contigo.",
            "Mi hogar no es un lugar, es donde estés tú, mi niña hermosa.",
            "Cada día te encuentro una nueva razón para amarte más y más.",
            "Contigo la magia existe y la vida es infinitamente más bonita.",
            "Eres la casualidad más hermosa y rockera que me ha sucedido.",
            "Mi lugar favorito en todo el mundo es estar entre tus brazos.",
            "A tu lado, cualquier día ordinario se vuelve completamente extraordinario.",
            "No sé a dónde nos lleve la vida, pero quiero que siempre vayas conmigo.",
            "Melody, tienes la sonrisa que quiero ver el resto de mis días.",
            "Me enamoro de ti cada día como si fuera la primera vez que te vi.",
            "Eres la pieza perfecta que le faltaba al rompecabezas de mi vida.",
            "Si el amor tiene un nombre y un sonido, para mí tiene los tuyos.",
            "Gracias por ser mi paz y mi refugio en medio del caos del mundo.",
            "Eres el sueño más hermoso del que nunca quiero despertar.",
            "Haces que mi corazón sonría y lata a mil por hora todos los días.",
            "Eres mi persona favorita en todo el universo, mi chica ideal.",
            "Cualquier momento es perfecto si tengo la suerte de compartirlo contigo.",
            "Tus abrazos son el único refugio que mi alma necesita.",
            "Eres la respuesta a todas las oraciones que nunca supe que hice.",
            "Me encanta la historia de amor loco y sincero que estamos escribiendo juntos.",
            "Te amo, Melody, en todos los idiomas y en todas las vidas posibles."
        ];

        // Fondos con tonos rockeros/románticos
        const gradients = [
            "linear-gradient(to bottom right, #2b1055 0%, #7597de 100%)", 
            "linear-gradient(135deg, #1f0030 0%, #6e0040 100%)", 
            "linear-gradient(to right, #232526 0%, #414345 100%)",
            "linear-gradient(120deg, #300000 0%, #8a0000 100%)", 
            "linear-gradient(to top, #09203f 0%, #537895 100%)", 
            "linear-gradient(to right, #243949 0%, #517fa4 100%)", 
            "linear-gradient(to right, #4b1248 0%, #f0c27b 100%)", 
            "linear-gradient(135deg, #667eea 0%, #764ba2 100%)" 
        ];

        const animations = ["anim-fade-up", "anim-zoom-in", "anim-glow"];
        const totalDays = 365;
        
        const body = document.getElementById('main-body');
        const phraseEl = document.getElementById('love-phrase');
        const dayCounterEl = document.getElementById('day-counter');
        const heartsContainer = document.getElementById('hearts-container');

        // Caché del día
        let currentDay = localStorage.getItem('melodyLoveDays');
        if (!currentDay) currentDay = 1;
        else currentDay = parseInt(currentDay);

        updateUI(false); 
        body.style.background = gradients[Math.floor(Math.random() * gradients.length)];

        function nextDay() {
            if (currentDay < totalDays) currentDay++;
            else currentDay = 1; 
            
            localStorage.setItem('melodyLoveDays', currentDay);
            updateUI(true);
        }

        function resetProgress() {
            currentDay = 1;
            localStorage.setItem('melodyLoveDays', currentDay);
            updateUI(true);
        }

        function updateUI(animateChanges) {
            dayCounterEl.innerText = `Día ${currentDay} / 365`;

            const phraseIndex = (currentDay - 1) % frasesDeAmor.length;
            const newPhrase = frasesDeAmor[phraseIndex];

            if(animateChanges) {
                const randomGradient = gradients[Math.floor(Math.random() * gradients.length)];
                const randomAnimation = animations[Math.floor(Math.random() * animations.length)];
                
                body.style.background = randomGradient;

                phraseEl.className = `cursive-font text-3xl md:text-4xl leading-relaxed drop-shadow-lg text-center`;
                void phraseEl.offsetWidth; 
                phraseEl.innerText = newPhrase;
                phraseEl.classList.add(randomAnimation);
            } else {
                phraseEl.innerText = newPhrase;
                phraseEl.classList.add('anim-fade-up');
            }
        }

        // ==========================================
        // 3. EFECTO CORAZONES FLOTANTES
        // ==========================================
        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('i');
                heart.classList.add('fa-solid', 'fa-heart', 'heart-bg');
                
                const size = Math.random() * 15 + 10;
                const left = Math.random() * 100;
                const duration = Math.random() * 8 + 6; 
                
                heart.style.fontSize = `${size}px`;
                heart.style.left = `${left}%`;
                heart.style.animationDuration = `${duration}s`;
                
                const colors = ['rgba(255,255,255,0.2)', 'rgba(255,105,180,0.3)', 'rgba(180,0,30,0.4)', 'rgba(147,112,219,0.3)'];
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];

                heartsContainer.appendChild(heart);
                setTimeout(() => { heart.remove(); }, duration * 1000);
            }, 600); 
        }
        createHearts();

    </script>
</body>
</html>
